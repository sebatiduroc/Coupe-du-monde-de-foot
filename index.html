<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icons.min.css">
<style>
:root{
  --bg:#0d1b2a; --panel:#1b263b; --accent:#2ec4b6; --gold:#ffd166; --text:#e0e1dd; --muted:#9aa5b1;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg,#0d1b2a,#1b263b);
  color:var(--text);
  min-height:100vh;
  padding:20px;
}
h1{
  text-align:center;
  font-size:2.2rem;
  margin-bottom:5px;
  color:var(--gold);
  letter-spacing:1px;
}
.subtitle{text-align:center; color:var(--muted); margin-bottom:25px;}

.tabs{display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:25px;}
.tab-btn{
  background:var(--panel); color:var(--text); border:1px solid #2ec4b633;
  padding:8px 16px; border-radius:20px; cursor:pointer; font-size:0.9rem;
  transition:.2s;
}
.tab-btn:hover{background:#2ec4b633;}
.tab-btn.active{background:var(--accent); color:#0d1b2a; font-weight:bold;}

.content{max-width:1100px; margin:0 auto;}
.group-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px;}

.group-card{
  background:var(--panel); border-radius:14px; padding:16px;
  box-shadow:0 4px 15px rgba(0,0,0,.3);
}
.group-card h2{color:var(--gold); margin-bottom:10px; font-size:1.1rem; border-bottom:1px solid #ffffff22; padding-bottom:6px;}

table.standings{width:100%; font-size:.85rem; margin-bottom:12px; border-collapse:collapse;}
table.standings th, table.standings td{padding:4px 6px; text-align:center;}
table.standings th{color:var(--muted); font-weight:normal; font-size:.75rem;}
table.standings td.team{text-align:left; cursor:pointer;}
table.standings td.team:hover{color:var(--accent);}
table.standings tr:nth-child(odd) td{background:#ffffff05;}

.match{
  display:flex; align-items:center; justify-content:space-between;
  background:#0d1b2a; border-radius:8px; padding:8px 10px; margin-bottom:6px;
  cursor:pointer; transition:.15s; font-size:.88rem;
}
.match:hover{background:#27374d; transform:translateX(3px);}
.match .teams{display:flex; align-items:center; gap:8px;}
.match .team-name{min-width:90px;}
.match .score{font-weight:bold; color:var(--gold); min-width:50px; text-align:center;}
.match .score.live{color:#ff5a5f; animation:pulse 1.5s infinite;}
.live-badge{color:#ff5a5f; font-weight:bold;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.4;}}
.match .meta{color:var(--muted); font-size:.75rem; text-align:right;}
.flag-icon{font-size:1.2em; border-radius:2px;}

/* Modal */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:none; align-items:center; justify-content:center; z-index:100;
  padding:15px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--panel); border-radius:14px; padding:22px; max-width:600px; width:100%;
  max-height:85vh; overflow-y:auto; position:relative;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.modal h2{color:var(--gold); margin-bottom:10px; text-align:center;}
.close-btn{
  position:absolute; top:12px; right:14px; background:none; border:none;
  color:var(--text); font-size:1.4rem; cursor:pointer;
}
.modal-score{
  display:flex; align-items:center; justify-content:center; gap:16px;
  font-size:1.6rem; font-weight:bold; margin:15px 0;
}
.modal-score .flag-icon{font-size:2rem;}
.modal-score .vs{color:var(--muted); font-size:1rem;}
.modal-meta{text-align:center; color:var(--muted); margin-bottom:15px; font-size:.85rem;}

.knockout{display:flex; flex-direction:column; gap:18px;}
.ko-round h2{color:var(--gold); font-size:1.05rem; margin-bottom:8px; border-bottom:1px solid #ffffff22; padding-bottom:5px;}
.ko-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:10px;}

footer{text-align:center; color:var(--muted); font-size:.75rem; margin-top:40px; padding:10px;}
</style>
</head>
<body>

<!-- Modal match -->
<div class="overlay" id="matchOverlay">
  <div class="modal" id="matchModal"></div>

const COUNTRY_NAMES = {};
Object.values(TEAMS).forEach(teams=>teams.forEach(t=>COUNTRY_NAMES[t.code]=t.name));

/* =========================================================
   UTILITAIRES
   ========================================================= */
function flag(code){
  if(code==="?") return `<span style="opacity:.4">🏳️</span>`;
  return `<span class="flag-icon flag-icon-${code}"></span>`;
}
function countryName(code){ return COUNTRY_NAMES[code] || code.toUpperCase(); }

function computeStandings(group){
  const table = {};
  group.teams.forEach(t=>table[t.code]={code:t.code, name:t.name, pts:0, j:0, g:0, n:0, p:0, bp:0, bc:0});
  group.matches.forEach(m=>{
    if(m.scoreHome===null) return;
    const h=table[m.home], a=table[m.away];
    h.j++; a.j++;
    h.bp+=m.scoreHome; h.bc+=m.scoreAway;
    a.bp+=m.scoreAway; a.bc+=m.scoreHome;
    if(m.scoreHome>m.scoreAway){h.pts+=3; h.g++; a.p++;}
    else if(m.scoreHome<m.scoreAway){a.pts+=3; a.g++; h.p++;}
    else{h.pts+=1; a.pts+=1; h.n++; a.n++;}
  });
  return Object.values(table).sort((x,y)=> y.pts-x.pts || (y.bp-y.bc)-(x.bp-x.bc) || y.bp-x.bp);
}

/* =========================================================
   RENDU — onglets

function setActive(btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

}

function showGroup(key, btn){
  setActive(btn);
  const g = DATA.groups[key];
  const standings = computeStandings(g);

  let html = `<div class="group-card" style="max-width:600px;margin:0 auto 20px;">

    <table class="standings">

      ${standings.map(t=>`
        <tr>
          <td class="team">${flag(t.code)} ${t.name}</td>
          <td>${t.j}</td><td>${t.g}</td><td>${t.n}</td><td>${t.p}</td><td>${t.bp}</td><td>${t.bc}</td><td><b>${t.pts}</b></td>
        </tr>`).join('')}
    </table>
  </div>
  <div class="group-card" style="max-width:600px;margin:0 auto;">
    <h2>Matchs</h2>
    ${g.matches.map(m=>matchRow(m)).join('')}
  </div>`;
  contentEl.innerHTML = html;
}

// Heure de coup d'envoi en timestamp UTC, à partir d'une date/heure exprimées
// en heure de Paris. Le tournoi se déroule entièrement en heure d'été (UTC+2).
function kickoffUTC(m){
  if(!m.time || m.time==="--:--") return null;
  const [y,mo,d] = m.date.split('-').map(Number);
  const [h,mi] = m.time.split(':').map(Number);
  return Date.UTC(y, mo-1, d, h-2, mi);
}

// Si l'API n'a pas (encore) mis à jour un match dont l'heure de coup d'envoi
// est déjà passée, on affiche un statut estimé plutôt que "À venir" (trompeur).
function effectiveStatus(m){
  if(m.status!=="À venir" || m.home==="?") return m.status;
  const ko = kickoffUTC(m);
  if(ko===null) return m.status;
  const elapsedMin = (Date.now()-ko)/60000;
  if(elapsedMin < 0) return "À venir";
  if(elapsedMin < 130) return "En direct (estimation)";
  return "Terminé (résultat à confirmer)";
}

function matchRow(m, showRound){
  const status = effectiveStatus(m);
  const isLive = status.startsWith("En direct");
  const pending = status==="Terminé (résultat à confirmer)" && m.scoreHome===null;
  const score = pending ? '? - ?' : (m.scoreHome===null ? 'vs' : `${m.scoreHome} - ${m.scoreAway}`);
  const scoreHtml = isLive ? `<span class="score live">${score}</span>` : `<span class="score">${score}</span>`;
  const teamsHtml = (m.home==="?")
    ? `<span class="team-name" style="min-width:auto; font-size:.8rem; color:var(--muted);">${m.label||'À déterminer'}</span>`
    : `<span class="team-name">${flag(m.home)} ${countryName(m.home)}</span>
       ${scoreHtml}
       <span class="team-name">${countryName(m.away)} ${flag(m.away)}</span>`;
  const statusHtml = isLive
    ? `<span class="live-badge">🔴 ${m.liveMinute? m.liveMinute+"' ":""}En direct${status.includes('estimation')?' (estimation)':''}</span>`
    : status;
  const metaExtra = showRound ? m.round : statusHtml;
  return `<div class="match" onclick="showMatch('${m.id}')">
    <div class="teams">
      ${teamsHtml}
    </div>
    <div class="meta">${formatDate(m.date)}<br>${m.time} • ${metaExtra}</div>
  </div>`;
}

function formatDate(d){
  const date = new Date(d+"T00:00:00");
  return date.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
}

function showKnockout(btn){
  setActive(btn);
  let html = `<div class="knockout">`;
  Object.entries(DATA.knockout).forEach(([round, matches])=>{
    html += `<div class="ko-round"><h2>${round}</h2><div class="ko-grid">
      ${matches.map(m=>matchRow(m)).join('')}
    </div></div>`;
  });
  html += `</div>`;
  contentEl.innerHTML = html;
}

function showUpcoming(btn){
  setActive(btn);

  // Rassemble tous les matchs avec leur poule/tour, ne garde que ceux non joués,
  // triés par date puis heure.
  const all = [];
  Object.entries(DATA.groups).forEach(([key,g])=>{
    g.matches.forEach(m=> all.push({...m, round:'Groupe '+key}));
  });
  Object.entries(DATA.knockout).forEach(([round,matches])=>{
    matches.forEach(m=> all.push({...m, round}));
  });

  const upcoming = all
    .filter(m=> effectiveStatus(m)==="À venir")
    .sort((a,b)=>{
      const ta = `${a.date}T${a.time==="--:--"?"00:00":a.time}`;
      const tb = `${b.date}T${b.time==="--:--"?"00:00":b.time}`;
      return ta.localeCompare(tb);
    });

  let html = `<div class="group-card" style="max-width:600px;margin:0 auto;">
    <h2>Matchs à venir (${upcoming.length})</h2>
    ${upcoming.map(m=>matchRow(m, true)).join('')}
  </div>`;
  contentEl.innerHTML = html;
}

/* =========================================================
   MISE À JOUR AUTOMATIQUE AU CHARGEMENT
   Tente de récupérer les résultats/calendriers réels via
   l'API publique gratuite TheSportsDB et met à jour DATA.
   Si l'appel échoue (hors-ligne, CORS, etc.), l'app reste
   utilisable avec les données locales ci-dessus.
   ========================================================= */

// Correspondance nom d'équipe (API, en anglais) -> code ISO utilisé dans l'app.
// Couvre les variantes de nommage de TheSportsDB ET de football-data.org.
const NAME_TO_CODE = {
  "Mexico":"mx","South Korea":"kr","Korea Republic":"kr","Korea, South":"kr","Czech Republic":"cz","Czechia":"cz","South Africa":"za",
  "Canada":"ca","Bosnia and Herzegovina":"ba","Bosnia-Herzegovina":"ba","Bosnia & Herzegovina":"ba","Switzerland":"ch","Qatar":"qa",
  "Brazil":"br","Morocco":"ma","Haiti":"ht","Scotland":"gb-sct",
  "USA":"us","United States":"us","United States of America":"us","Paraguay":"py","Australia":"au","Turkey":"tr","Türkiye":"tr","Turkiye":"tr",
  "Germany":"de","Curacao":"cw","Curaçao":"cw","Ivory Coast":"ci","Côte d'Ivoire":"ci","Cote d'Ivoire":"ci","Ecuador":"ec",
  "Netherlands":"nl","Japan":"jp","Sweden":"se","Tunisia":"tn",
  "Belgium":"be","Egypt":"eg","Iran":"ir","IR Iran":"ir","Islamic Republic of Iran":"ir","New Zealand":"nz",
  "Spain":"es","Cape Verde":"cv","Cabo Verde":"cv","Saudi Arabia":"sa","Uruguay":"uy",
  "France":"fr","Senegal":"sn","Sénégal":"sn","Iraq":"iq","Norway":"no",
  "Argentina":"ar","Algeria":"dz","Austria":"at","Jordan":"jo",
  "Portugal":"pt","DR Congo":"cd","Congo DR":"cd","DRC":"cd","Democratic Republic of the Congo":"cd","Congo":"cd","Uzbekistan":"uz","Colombia":"co",
  "England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"
};

function findMatchByTeams(homeCode, awayCode){
  const all = [...Object.values(DATA.groups).flatMap(g=>g.matches), ...Object.values(DATA.knockout).flatMap(a=>a)];
  return all.find(m => (m.home===homeCode && m.away===awayCode) || (m.home===awayCode && m.away===homeCode));
}

// Clé API personnelle football-data.org (lecture seule, 10 req/min).
const FD_API_KEY = "251aacd7b52e41d9bc50a056e4c5f514";

// Convertit une date UTC (objet Date) en {date, time} exprimés en heure de Paris.
function toParis(utcDate){
  const dateParts = new Intl.DateTimeFormat('en-CA', {
    timeZone:'Europe/Paris', year:'numeric', month:'2-digit', day:'2-digit'
  }).formatToParts(utcDate).reduce((o,p)=>{o[p.type]=p.value; return o;},{});
  const timeParts = new Intl.DateTimeFormat('fr-FR', {
    timeZone:'Europe/Paris', hour:'2-digit', minute:'2-digit'
  }).formatToParts(utcDate).reduce((o,p)=>{o[p.type]=p.value; return o;},{});
  return { date:`${dateParts.year}-${dateParts.month}-${dateParts.day}`, time:`${timeParts.hour}:${timeParts.minute}` };
}

// Source 1 : football-data.org (clé personnelle, fiable, statut + score en direct)
async function fetchFromFootballData(){
  const res = await fetch("https://api.football-data.org/v4/competitions/WC/matches", {
    headers: { "X-Auth-Token": FD_API_KEY }
  });
  if(!res.ok) throw new Error("football-data.org HTTP "+res.status);
  const json = await res.json();
  const matches = json.matches;
  if(!Array.isArray(matches) || matches.length===0) throw new Error("football-data.org: aucun match renvoyé");

  let updated = 0;
  matches.forEach(ev=>{
    const homeCode = NAME_TO_CODE[ev.homeTeam && ev.homeTeam.name];
    const awayCode = NAME_TO_CODE[ev.awayTeam && ev.awayTeam.name];
    if(!homeCode || !awayCode) return;
    const m = findMatchByTeams(homeCode, awayCode);
    if(!m) return;

    if(ev.utcDate){
      const utcDate = new Date(ev.utcDate);
      if(!isNaN(utcDate)){
        const {date,time} = toParis(utcDate);
        m.date = date; m.time = time;
      }
    }

    let newStatus = m.status;
    switch(ev.status){
      case "FINISHED":
      case "AWARDED":
        newStatus = "Terminé"; break;
      case "IN_PLAY":
        newStatus = "En direct"; m.liveMinute = (ev.minute!=null) ? String(ev.minute) : null; break;
      case "PAUSED":
        newStatus = "En direct"; m.liveMinute = "MT"; break;
      case "SCHEDULED":
      case "TIMED":
        newStatus = "À venir"; break;
      // POSTPONED / SUSPENDED / CANCELLED : on ne change pas le statut existant
    }
    m.status = newStatus;

    const ft = ev.score && ev.score.fullTime;
    if(ft && ft.home!==null && ft.away!==null){
      if(m.home===homeCode){ m.scoreHome=ft.home; m.scoreAway=ft.away; }
      else { m.scoreHome=ft.away; m.scoreAway=ft.home; }
      if(newStatus!=="À venir") updated++;
    }
  });
  return updated;
}

// Source 2 (repli) : TheSportsDB — utilisée seulement si football-data.org échoue.
async function fetchFromTheSportsDB(){
  let events = [];
  for(const season of ["2026-2027","2026"]){
    const res = await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4429&s=${season}`);
    if(!res.ok) continue;
    const json = await res.json();
    if(json && Array.isArray(json.events) && json.events.length){
      events = json.events;
      break;
    }
  }
  if(events.length===0) throw new Error("TheSportsDB: aucun évènement renvoyé");

  let updated = 0;
  events.forEach(ev=>{
    const homeCode = NAME_TO_CODE[ev.strHomeTeam];
    const awayCode = NAME_TO_CODE[ev.strAwayTeam];
    if(!homeCode || !awayCode) return;

    const m = findMatchByTeams(homeCode, awayCode);
    if(!m) return;

    if(ev.dateEvent && ev.strTime){
      const utcDate = new Date(`${ev.dateEvent}T${ev.strTime}Z`);
      if(!isNaN(utcDate)){
        const {date,time} = toParis(utcDate);
        m.date = date; m.time = time;
      }
    }

    const rawStatus = (ev.strStatus||"").trim();
    const s = rawStatus.toLowerCase();
    const finishedStatuses = ["ft","aet","pen","match finished","finished","ftpen","ftet"];
    const notStartedStatuses = ["ns","not started","",null];

    let newStatus = m.status;
    if(finishedStatuses.includes(s)){
      newStatus = "Terminé";
    } else if(notStartedStatuses.includes(s)){
      newStatus = "À venir";
    } else {
      newStatus = "En direct";
      if(/^\d+(\+\d+)?'?$/.test(rawStatus)) m.liveMinute = rawStatus.replace("'","");
      else if(s==="ht") m.liveMinute = "MT";
      else m.liveMinute = null;
    }
    m.status = newStatus;

    if(ev.intHomeScore!==null && ev.intHomeScore!=="" && ev.intAwayScore!==null && ev.intAwayScore!==""){
      const homeScore = parseInt(ev.intHomeScore);
      const awayScore = parseInt(ev.intAwayScore);
      if(m.home===homeCode){ m.scoreHome=homeScore; m.scoreAway=awayScore; }
      else { m.scoreHome=awayScore; m.scoreAway=homeScore; }
      if(newStatus!=="À venir") updated++;
    }
  });
  return updated;
}

async function fetchLiveData(silent){
  const banner = document.getElementById('updateBanner');
  if(!silent) banner.textContent = "⏳ Mise à jour des résultats en cours…";

  let updated = 0;
  let source = null;

  try{
    updated = await fetchFromFootballData();
    source = "football-data.org";
  }catch(err1){
    console.warn(err1);
    try{
      updated = await fetchFromTheSportsDB();
      source = "TheSportsDB";
    }catch(err2){
      console.warn(err2);
    }
  }

  const live = [...Object.values(DATA.groups).flatMap(g=>g.matches), ...Object.values(DATA.knockout).flatMap(a=>a)]
    .filter(m=>m.status==="En direct").length;

  if(!silent){
    if(source){
      let msg = `✅ ${updated} match(s) mis à jour (${source}).`;
      if(live>0) msg += ` 🔴 ${live} en direct.`;
      banner.textContent = msg;
    } else {
      banner.textContent = "⚠️ Mise à jour automatique indisponible (hors-ligne ou API inaccessible) — données locales affichées.";
    }
  }

  // Recalculer l'index des matchs et réafficher l'onglet courant
  Object.keys(allMatches).forEach(k=>delete allMatches[k]);
  [...Object.values(DATA.groups).flatMap(g=>g.matches), ...Object.values(DATA.knockout).flatMap(a=>a)]
    .forEach(m=>allMatches[m.id]=m);

  const activeBtn = tabsEl.querySelector('.tab-btn.active');
  if(activeBtn && activeBtn.textContent.startsWith('Groupe')){
    showGroup(activeBtn.textContent.replace('Groupe ','').trim(), activeBtn);
  } else if(activeBtn && activeBtn.textContent==='Matchs à venir'){
    showUpcoming(activeBtn);
  } else if(activeBtn){
    showKnockout(activeBtn);
  }

  if(!silent){
    banner.style.opacity='1';
    setTimeout(()=>{ banner.style.opacity='0'; }, 6000);
  }
}
