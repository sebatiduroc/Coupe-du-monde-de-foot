<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icons.min.css">
<style>
:root{
  --bg:#0d1b2a; --panel:#1b263b; --accent:#2ec4b6; --gold:#ffd166; --text:#e0e1dd; --muted:#9aa5b1;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg,#0d1b2a,#1b263b);
  color:var(--text);
  min-height:100vh;
  padding:20px;
}
h1{
  text-align:center;
  font-size:2.2rem;
  margin-bottom:5px;
  color:var(--gold);
  letter-spacing:1px;
}
.subtitle{text-align:center; color:var(--muted); margin-bottom:25px;}

.tabs{display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:25px;}
.tab-btn{
  background:var(--panel); color:var(--text); border:1px solid #2ec4b633;
  padding:8px 16px; border-radius:20px; cursor:pointer; font-size:0.9rem;
  transition:.2s;
}
.tab-btn:hover{background:#2ec4b633;}
.tab-btn.active{background:var(--accent); color:#0d1b2a; font-weight:bold;}

.content{max-width:1100px; margin:0 auto;}
.group-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px;}

.group-card{
  background:var(--panel); border-radius:14px; padding:16px;
  box-shadow:0 4px 15px rgba(0,0,0,.3);
}
.group-card h2{color:var(--gold); margin-bottom:10px; font-size:1.1rem; border-bottom:1px solid #ffffff22; padding-bottom:6px;}

table.standings{width:100%; font-size:.85rem; margin-bottom:12px; border-collapse:collapse;}
table.standings th, table.standings td{padding:4px 6px; text-align:center;}
table.standings th{color:var(--muted); font-weight:normal; font-size:.75rem;}
table.standings td.team{text-align:left; cursor:pointer;}
table.standings td.team:hover{color:var(--accent);}
table.standings tr:nth-child(odd) td{background:#ffffff05;}

.match{
  display:flex; align-items:center; justify-content:space-between;
  background:#0d1b2a; border-radius:8px; padding:8px 10px; margin-bottom:6px;
  cursor:pointer; transition:.15s; font-size:.88rem;
}
.match:hover{background:#27374d; transform:translateX(3px);}
.match .teams{display:flex; align-items:center; gap:8px;}
.match .team-name{min-width:90px;}
.match .score{font-weight:bold; color:var(--gold); min-width:50px; text-align:center;}
.match .meta{color:var(--muted); font-size:.75rem; text-align:right;}
.flag-icon{font-size:1.2em; border-radius:2px;}

/* Modal */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:none; align-items:center; justify-content:center; z-index:100;
  padding:15px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--panel); border-radius:14px; padding:22px; max-width:600px; width:100%;
  max-height:85vh; overflow-y:auto; position:relative;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.modal h2{color:var(--gold); margin-bottom:10px; text-align:center;}
.close-btn{
  position:absolute; top:12px; right:14px; background:none; border:none;
  color:var(--text); font-size:1.4rem; cursor:pointer;
}
.modal-score{
  display:flex; align-items:center; justify-content:center; gap:16px;
  font-size:1.6rem; font-weight:bold; margin:15px 0;
}
.modal-score .flag-icon{font-size:2rem;}
.modal-score .vs{color:var(--muted); font-size:1rem;}
.modal-meta{text-align:center; color:var(--muted); margin-bottom:15px; font-size:.85rem;}

.knockout{display:flex; flex-direction:column; gap:18px;}
.ko-round h2{color:var(--gold); font-size:1.05rem; margin-bottom:8px; border-bottom:1px solid #ffffff22; padding-bottom:5px;}
.ko-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:10px;}

footer{text-align:center; color:var(--muted); font-size:.75rem; margin-top:40px; padding:10px;}
</style>
</head>
<body>

<h1>🏆 Coupe du Monde 2026</h1>
<p class="subtitle">Calendrier, dates, heures (Paris) et scores par groupe</p>
<p id="updateBanner" style="text-align:center; font-size:.8rem; color:var(--accent); transition:opacity 1s; min-height:1.2em;"></p>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<!-- Modal match -->
<div class="overlay" id="matchOverlay">
  <div class="modal" id="matchModal"></div>
</div>

<footer>App statique générée pour GitHub Pages — Données récupérées automatiquement depuis TheSportsDB au chargement.</footer>

<script>
/* =========================================================
   DONNÉES — à compléter / mettre à jour au fil du tournoi.
   Codes pays = code ISO 2 lettres (pour flag-icons.css)
   ========================================================= */
const DATA = {
  // 48 équipes qualifiées, réparties dans les 12 groupes officiels (tirage du 5/12/2025)
  teamsByGroup: {
    A: [{code:"mx", name:"Mexique"},{code:"kr", name:"Corée du Sud"},{code:"cz", name:"Tchéquie"},{code:"za", name:"Afrique du Sud"}],
    B: [{code:"ca", name:"Canada"},{code:"ba", name:"Bosnie-Herzégovine"},{code:"ch", name:"Suisse"},{code:"qa", name:"Qatar"}],
    C: [{code:"br", name:"Brésil"},{code:"ma", name:"Maroc"},{code:"ht", name:"Haïti"},{code:"gb-sct", name:"Écosse"}],
    D: [{code:"us", name:"États-Unis"},{code:"py", name:"Paraguay"},{code:"au", name:"Australie"},{code:"tr", name:"Turquie"}],
    E: [{code:"de", name:"Allemagne"},{code:"cw", name:"Curaçao"},{code:"ci", name:"Côte d'Ivoire"},{code:"ec", name:"Équateur"}],
    F: [{code:"nl", name:"Pays-Bas"},{code:"jp", name:"Japon"},{code:"se", name:"Suède"},{code:"tn", name:"Tunisie"}],
    G: [{code:"be", name:"Belgique"},{code:"eg", name:"Égypte"},{code:"ir", name:"Iran"},{code:"nz", name:"Nouvelle-Zélande"}],
    H: [{code:"es", name:"Espagne"},{code:"cv", name:"Cap-Vert"},{code:"sa", name:"Arabie Saoudite"},{code:"uy", name:"Uruguay"}],
    I: [{code:"fr", name:"France"},{code:"sn", name:"Sénégal"},{code:"iq", name:"Irak"},{code:"no", name:"Norvège"}],
    J: [{code:"ar", name:"Argentine"},{code:"dz", name:"Algérie"},{code:"at", name:"Autriche"},{code:"jo", name:"Jordanie"}],
    K: [{code:"pt", name:"Portugal"},{code:"cd", name:"RD Congo"},{code:"uz", name:"Ouzbékistan"},{code:"co", name:"Colombie"}],
    L: [{code:"gb-eng", name:"Angleterre"},{code:"hr", name:"Croatie"},{code:"gh", name:"Ghana"},{code:"pa", name:"Panama"}]
  },

  groups: {}, // construit dynamiquement ci-dessous par buildGroups()

  knockout: {
    "16es de finale": [
      emptyMatch("r32-1","?","?","2026-06-28"),
      emptyMatch("r32-2","?","?","2026-06-28"),
      emptyMatch("r32-3","?","?","2026-06-29"),
      emptyMatch("r32-4","?","?","2026-06-29")
      // ➜ 16 matchs au total, complétés une fois la phase de groupes terminée.
    ],
    "8es de finale": [
      emptyMatch("r16-1","?","?","2026-07-02"),
      emptyMatch("r16-2","?","?","2026-07-03")
    ],
    "Quarts de finale": [
      emptyMatch("qf-1","?","?","2026-07-09")
    ],
    "Demi-finales": [
      emptyMatch("sf-1","?","?","2026-07-14")
    ],
    "Finale": [
      emptyMatch("final","?","?","2026-07-19")
    ]
  }
};

function emptyMatch(id, home, away, date, time){
  return {id, date, time:time||"--:--", home, away, scoreHome:null, scoreAway:null, status:"À venir"};
}

// Calendrier officiel de la phase de groupes, horaires convertis en heure de Paris (CEST).
// Pour chaque groupe, 6 créneaux [date, heure] correspondant à l'ordre des rencontres
// généré par pairOrder ci-dessous : [0-1],[2-3],[0-2],[1-3],[0-3],[1-2] (indices des équipes
// dans teamsByGroup). Les dates encore inconnues précisément (3e journée de certains
// groupes, programmées entre le 25 et le 27 juin) sont indiquées avec une heure "--:--".
const SCHEDULE = {
  A: [["2026-06-19","03:00"],["2026-06-18","18:00"],["2026-06-25","03:00"],["2026-06-25","03:00"],["2026-06-11","21:00"],["2026-06-12","21:00"]],
  B: [["2026-06-12","21:00"],["2026-06-13","21:00"],["2026-06-24","21:00"],["2026-06-24","21:00"],["2026-06-19","00:00"],["2026-06-18","21:00"]],
  C: [["2026-06-14","00:00"],["2026-06-14","03:00"],["2026-06-20","02:30"],["2026-06-20","00:00"],["2026-06-25","00:00"],["2026-06-25","00:00"]],
  D: [["2026-06-13","03:00"],["2026-06-14","06:00"],["2026-06-19","21:00"],["2026-06-20","05:00"],["2026-06-25","--:--"],["2026-06-25","--:--"]],
  E: [["2026-06-14","19:00"],["2026-06-15","01:00"],["2026-06-20","22:00"],["2026-06-21","02:00"],["2026-06-25","22:00"],["2026-06-25","22:00"]],
  F: [["2026-06-14","22:00"],["2026-06-15","04:00"],["2026-06-20","19:00"],["2026-06-21","06:00"],["2026-06-26","01:00"],["2026-06-26","--:--"]],
  G: [["2026-06-15","21:00"],["2026-06-16","03:00"],["2026-06-21","21:00"],["2026-06-22","03:00"],["2026-06-26","--:--"],["2026-06-26","--:--"]],
  H: [["2026-06-15","18:00"],["2026-06-16","00:00"],["2026-06-21","18:00"],["2026-06-22","00:00"],["2026-06-26","--:--"],["2026-06-26","--:--"]],
  I: [["2026-06-16","21:00"],["2026-06-17","00:00"],["2026-06-22","23:00"],["2026-06-23","02:00"],["2026-06-26","21:00"],["2026-06-26","21:00"]],
  J: [["2026-06-17","03:00"],["2026-06-17","06:00"],["2026-06-22","19:00"],["2026-06-23","05:00"],["2026-06-27","--:--"],["2026-06-27","--:--"]],
  K: [["2026-06-17","19:00"],["2026-06-18","04:00"],["2026-06-23","19:00"],["2026-06-24","04:00"],["2026-06-27","--:--"],["2026-06-27","--:--"]],
  L: [["2026-06-17","22:00"],["2026-06-18","01:00"],["2026-06-23","22:00"],["2026-06-24","01:00"],["2026-06-27","--:--"],["2026-06-27","--:--"]]
};

function buildGroups(){
  // Ordre des rencontres dans une poule de 4, correspondant aux index 0-3 de teamsByGroup
  const pairOrder = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];

  Object.entries(DATA.teamsByGroup).forEach(([key, teams])=>{
    const sched = SCHEDULE[key];
    const matches = pairOrder.map((pair,i)=>{
      const id = key.toLowerCase()+(i+1);
      const [date,time] = sched[i];
      return emptyMatch(id, teams[pair[0]].code, teams[pair[1]].code, date, time);
    });
    DATA.groups[key] = { teams, matches };
  });
}
buildGroups();
const COUNTRY_NAMES = {};
Object.values(DATA.groups).forEach(g=>g.teams.forEach(t=>COUNTRY_NAMES[t.code]=t.name));

/* =========================================================
   UTILITAIRES
   ========================================================= */
function flag(code){
  if(code==="?") return `<span style="opacity:.4">🏳️</span>`;
  return `<span class="flag-icon flag-icon-${code}"></span>`;
}
function countryName(code){ return COUNTRY_NAMES[code] || code.toUpperCase(); }

function computeStandings(group){
  const table = {};
  group.teams.forEach(t=>table[t.code]={code:t.code, name:t.name, pts:0, j:0, g:0, n:0, p:0, bp:0, bc:0});
  group.matches.forEach(m=>{
    if(m.scoreHome===null) return;
    const h=table[m.home], a=table[m.away];
    h.j++; a.j++;
    h.bp+=m.scoreHome; h.bc+=m.scoreAway;
    a.bp+=m.scoreAway; a.bc+=m.scoreHome;
    if(m.scoreHome>m.scoreAway){h.pts+=3; h.g++; a.p++;}
    else if(m.scoreHome<m.scoreAway){a.pts+=3; a.g++; h.p++;}
    else{h.pts+=1; a.pts+=1; h.n++; a.n++;}
  });
  return Object.values(table).sort((x,y)=> y.pts-x.pts || (y.bp-y.bc)-(x.bp-x.bc) || y.bp-x.bp);
}

/* =========================================================
   RENDU — onglets
   ========================================================= */
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
const groupKeys = Object.keys(DATA.groups);

groupKeys.forEach((key,i)=>{
  const btn = document.createElement('button');
  btn.className='tab-btn'+(i===0?' active':'');
  btn.textContent='Groupe '+key;
  btn.onclick=()=>showGroup(key, btn);
  tabsEl.appendChild(btn);
});
const koBtn = document.createElement('button');
koBtn.className='tab-btn';
koBtn.textContent='Phase finale';
koBtn.onclick=()=>showKnockout(koBtn);
tabsEl.appendChild(koBtn);

function setActive(btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function showGroup(key, btn){
  setActive(btn);
  const g = DATA.groups[key];
  const standings = computeStandings(g);

  let html = `<div class="group-card" style="max-width:600px;margin:0 auto 20px;">
    <h2>Groupe ${key} — Classement</h2>
    <table class="standings">
      <tr><th style="text-align:left">Équipe</th><th>J</th><th>G</th><th>N</th><th>P</th><th>BP</th><th>BC</th><th>Pts</th></tr>
      ${standings.map(t=>`
        <tr>
          <td class="team">${flag(t.code)} ${t.name}</td>
          <td>${t.j}</td><td>${t.g}</td><td>${t.n}</td><td>${t.p}</td><td>${t.bp}</td><td>${t.bc}</td><td><b>${t.pts}</b></td>
        </tr>`).join('')}
    </table>
  </div>
  <div class="group-card" style="max-width:600px;margin:0 auto;">
    <h2>Matchs</h2>
    ${g.matches.map(m=>matchRow(m)).join('')}
  </div>`;
  contentEl.innerHTML = html;
}

function matchRow(m){
  const score = m.scoreHome===null ? 'vs' : `${m.scoreHome} - ${m.scoreAway}`;
  return `<div class="match" onclick="showMatch('${m.id}')">
    <div class="teams">
      <span class="team-name">${flag(m.home)} ${countryName(m.home)}</span>
      <span class="score">${score}</span>
      <span class="team-name">${countryName(m.away)} ${flag(m.away)}</span>
    </div>
    <div class="meta">${formatDate(m.date)}<br>${m.time} • ${m.status}</div>
  </div>`;
}

function formatDate(d){
  const date = new Date(d+"T00:00:00");
  return date.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
}

function showKnockout(btn){
  setActive(btn);
  let html = `<div class="knockout">`;
  Object.entries(DATA.knockout).forEach(([round, matches])=>{
    html += `<div class="ko-round"><h2>${round}</h2><div class="ko-grid">
      ${matches.map(m=>matchRow(m)).join('')}
    </div></div>`;
  });
  html += `</div>`;
  contentEl.innerHTML = html;
}

/* =========================================================
   MODAL MATCH
   ========================================================= */
const allMatches = {};
[...Object.values(DATA.groups).flatMap(g=>g.matches), ...Object.values(DATA.knockout).flatMap(a=>a)]
  .forEach(m=>allMatches[m.id]=m);

function showMatch(id){
  const m = allMatches[id];
  const modal = document.getElementById('matchModal');

  let body = `<button class="close-btn" onclick="closeOverlay('matchOverlay')">✕</button>
    <h2>${countryName(m.home)} — ${countryName(m.away)}</h2>
    <div class="modal-score">
      <span>${flag(m.home)}</span>
      <span>${m.scoreHome===null?'-':m.scoreHome} <span class="vs">:</span> ${m.scoreAway===null?'-':m.scoreAway}</span>
      <span>${flag(m.away)}</span>
    </div>
    <div class="modal-meta">${formatDate(m.date)} • ${m.time} (heure de Paris) • ${m.status}</div>`;

  modal.innerHTML = body;
  document.getElementById('matchOverlay').classList.add('show');
}

function closeOverlay(id){
  document.getElementById(id).classList.remove('show');
}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click', e=>{ if(e.target===o) o.classList.remove('show'); });
});

/* =========================================================
   MISE À JOUR AUTOMATIQUE AU CHARGEMENT
   Tente de récupérer les résultats/calendriers réels via
   l'API publique gratuite TheSportsDB et met à jour DATA.
   Si l'appel échoue (hors-ligne, CORS, etc.), l'app reste
   utilisable avec les données locales ci-dessus.
   ========================================================= */

// Correspondance nom d'équipe (API, en anglais) -> code ISO utilisé dans l'app
const NAME_TO_CODE = {
  "Mexico":"mx","South Korea":"kr","Korea Republic":"kr","Czech Republic":"cz","Czechia":"cz","South Africa":"za",
  "Canada":"ca","Bosnia and Herzegovina":"ba","Bosnia-Herzegovina":"ba","Switzerland":"ch","Qatar":"qa",
  "Brazil":"br","Morocco":"ma","Haiti":"ht","Scotland":"gb-sct",
  "USA":"us","United States":"us","Paraguay":"py","Australia":"au","Turkey":"tr","Türkiye":"tr",
  "Germany":"de","Curacao":"cw","Curaçao":"cw","Ivory Coast":"ci","Côte d'Ivoire":"ci","Cote d'Ivoire":"ci","Ecuador":"ec",
  "Netherlands":"nl","Japan":"jp","Sweden":"se","Tunisia":"tn",
  "Belgium":"be","Egypt":"eg","Iran":"ir","IR Iran":"ir","New Zealand":"nz",
  "Spain":"es","Cape Verde":"cv","Cabo Verde":"cv","Saudi Arabia":"sa","Uruguay":"uy",
  "France":"fr","Senegal":"sn","Sénégal":"sn","Iraq":"iq","Norway":"no",
  "Argentina":"ar","Algeria":"dz","Austria":"at","Jordan":"jo",
  "Portugal":"pt","DR Congo":"cd","Congo DR":"cd","DRC":"cd","Uzbekistan":"uz","Colombia":"co",
  "England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"
};

function findMatchByTeams(homeCode, awayCode){
  const all = [...Object.values(DATA.groups).flatMap(g=>g.matches), ...Object.values(DATA.knockout).flatMap(a=>a)];
  return all.find(m => (m.home===homeCode && m.away===awayCode) || (m.home===awayCode && m.away===homeCode));
}

async function fetchLiveData(){
  const banner = document.getElementById('updateBanner');
  banner.textContent = "⏳ Mise à jour des résultats en cours…";
  try{
    // Saison Coupe du Monde 2026, ligue FIFA World Cup (id 4429) sur TheSportsDB
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4429&s=2026");
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json = await res.json();
    const events = json.events || [];
    let updated = 0;

    events.forEach(ev=>{
      const homeCode = NAME_TO_CODE[ev.strHomeTeam];
      const awayCode = NAME_TO_CODE[ev.strAwayTeam];
      if(!homeCode || !awayCode) return; // équipe pas encore connue dans l'app

      const m = findMatchByTeams(homeCode, awayCode);
      if(!m) return;

      // Date / heure : l'API renvoie l'horaire en UTC, on le convertit en heure de Paris
      if(ev.dateEvent && ev.strTime){
        const utcDate = new Date(`${ev.dateEvent}T${ev.strTime}Z`);
        if(!isNaN(utcDate)){
          // Format date/heure dans le fuseau Europe/Paris
          const dateParts = new Intl.DateTimeFormat('en-CA', {
            timeZone:'Europe/Paris', year:'numeric', month:'2-digit', day:'2-digit'
          }).formatToParts(utcDate).reduce((o,p)=>{o[p.type]=p.value; return o;},{});
          const timeParts = new Intl.DateTimeFormat('fr-FR', {
            timeZone:'Europe/Paris', hour:'2-digit', minute:'2-digit'
          }).formatToParts(utcDate).reduce((o,p)=>{o[p.type]=p.value; return o;},{});
          m.date = `${dateParts.year}-${dateParts.month}-${dateParts.day}`;
          m.time = `${timeParts.hour}:${timeParts.minute}`;
        }
      }

      // Score si le match a été joué
      if(ev.intHomeScore!==null && ev.intHomeScore!=="" && ev.intAwayScore!==null && ev.intAwayScore!==""){
        const homeScore = parseInt(ev.intHomeScore);
        const awayScore = parseInt(ev.intAwayScore);
        // Respecter l'orientation home/away définie dans DATA
        if(m.home===homeCode){
          m.scoreHome = homeScore; m.scoreAway = awayScore;
        } else {
          m.scoreHome = awayScore; m.scoreAway = homeScore;
        }
        m.status = "Terminé";
        updated++;
      } else if(ev.strStatus){
        const s = ev.strStatus.toLowerCase();
        if(s.includes("live") || s.includes("1h") || s.includes("2h") || s.includes("ht")){
          m.status = "En direct";
        } else {
          m.status = "À venir";
        }
      }
    });

    banner.textContent = updated>0
      ? `✅ ${updated} match(s) mis à jour depuis TheSportsDB.`
      : "ℹ️ Aucune mise à jour disponible (les matchs n'ont peut-être pas encore commencé) — données locales affichées.";

  }catch(err){
    banner.textContent = "⚠️ Mise à jour automatique indisponible (hors-ligne ou API inaccessible) — données locales affichées.";
    console.warn("fetchLiveData error:", err);
  }finally{
    // Recalculer l'index des matchs et réafficher l'onglet courant
    Object.keys(allMatches).forEach(k=>delete allMatches[k]);
    [...Object.values(DATA.groups).flatMap(g=>g.matches), ...Object.values(DATA.knockout).flatMap(a=>a)]
      .forEach(m=>allMatches[m.id]=m);

    const activeBtn = tabsEl.querySelector('.tab-btn.active');
    if(activeBtn && activeBtn.textContent.startsWith('Groupe')){
      showGroup(activeBtn.textContent.replace('Groupe ','').trim(), activeBtn);
    } else if(activeBtn){
      showKnockout(activeBtn);
    }

    setTimeout(()=>{ banner.style.opacity='0'; }, 6000);
  }
}

/* Affichage initial */
showGroup(groupKeys[0], tabsEl.querySelector('.tab-btn'));
fetchLiveData();
</script>
</body>
</html>
